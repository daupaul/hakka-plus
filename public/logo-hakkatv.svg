<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="currentColor">
  <!-- 5-petal Tung flower icon inside a ring (官方客家電視台 logo 風格) -->
  <g transform="translate(28 28)">
    <!-- Outer ring -->
    <circle r="24" fill="none" stroke="currentColor" stroke-width="2.6" />
    <!-- 5 teardrop petals around center (72° apart) -->
    <g>
      <!-- Top petal (12 o'clock) -->
      <path d="M 0 -16 C -5 -16 -7 -10 -5 -4 C -2 -1 2 -1 5 -4 C 7 -10 5 -16 0 -16 Z" />
      <!-- Top-right (72°) -->
      <path d="M 15.2 -4.95 C 12.07 -8.9 6.04 -7.83 3.05 -2.55 C 2.21 1.32 5.07 4.16 8.99 3.4 C 14.83 1.65 17.55 -1.95 15.2 -4.95 Z" />
      <!-- Bottom-right (144°) -->
      <path d="M 9.39 12.95 C 11.86 8.71 8.99 3.4 3.05 2.55 C -0.71 3.05 -2.49 6.79 -0.55 10.27 C 2.84 15.13 6.93 16.95 9.39 12.95 Z" />
      <!-- Bottom-left (216°) -->
      <path d="M -9.39 12.95 C -11.86 8.71 -8.99 3.4 -3.05 2.55 C 0.71 3.05 2.49 6.79 0.55 10.27 C -2.84 15.13 -6.93 16.95 -9.39 12.95 Z" />
      <!-- Top-left (288°) -->
      <path d="M -15.2 -4.95 C -12.07 -8.9 -6.04 -7.83 -3.05 -2.55 C -2.21 1.32 -5.07 4.16 -8.99 3.4 C -14.83 1.65 -17.55 -1.95 -15.2 -4.95 Z" />
    </g>
    <!-- Center stamen dot -->
    <circle r="2.4" />
  </g>

  <!-- Wordmark "HakkaTV" — bold sans-serif -->
  <g transform="translate(66 36)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Inter',sans-serif" font-weight="900" font-size="28" letter-spacing="-0.5">
    <text>HakkaTV</text>
  </g>
</svg>
